type Profile @model @auth(rules: [{ allow: public }, { allow: private }]) {

  id: ID!
  publicKey: String!
  username: String! @index(name: "byUsername", queryField: "profileByUsername")
  updatedAt: AWSDateTime
}

type Message @model @auth(rules: [{ allow: public }, { allow: private }]) {

  id: ID!
  senderId: ID! @index(name: "bySender", queryField: "messagesBySender")
  receiverId: ID! @index(name: "byReceiver", queryField: "messagesByReceiver")
  content: String!
  status: Int
  createdAt: AWSDateTime!
}
